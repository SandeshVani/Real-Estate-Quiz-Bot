<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Real Estate Quiz Bot{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">🏠 Real Estate Quiz Bot</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/quiz">Take Quiz</a>
            </div>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Powered by LangChain & Groq AI | Real Estate Education Platform</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
